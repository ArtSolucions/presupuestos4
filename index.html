<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Art Solucions — Presupuestos</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f4f6f9;color:#1e293b;font-size:13px}
@media print{
  #app-root{display:none!important}
  #print-area{display:block!important}
}
#print-area{display:none;font-family:sans-serif;font-size:11px;color:#111;padding:20px;max-width:1000px;margin:auto}
#print-area h1{font-size:16px;margin-bottom:4px}
#print-area h2{font-size:12px;color:#333;border-bottom:2px solid #f59e0b;padding-bottom:3px;margin:14px 0 6px;text-transform:uppercase}
#print-area h3{font-size:12px;margin:10px 0 3px;background:#f3f4f6;padding:4px 8px;border-radius:3px}
#print-area h4{font-size:11px;margin:6px 0 2px;color:#555}
#print-area .info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:12px;padding:8px;background:#f9fafb;border-radius:4px;font-size:11px}
#print-area .info span{color:#666}
#print-area .prod{margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #e5e7eb}
#print-area table{width:100%;border-collapse:collapse;margin:4px 0 8px;font-size:11px}
#print-area th{background:#f3f4f6;padding:5px 7px;text-align:left;border:1px solid #e5e7eb;font-size:10px}
#print-area td{padding:4px 7px;border:1px solid #f0f0f0}
#print-area td:nth-child(n+2){text-align:right}
#print-area .stot{background:#fffbeb;border:1px solid #f59e0b;padding:5px 10px;border-radius:3px;font-size:11px;margin-top:4px}
#print-area .grand{background:#fff7ed;border:2px solid #f59e0b;padding:10px;margin-top:14px;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<div id="app-root"></div>
<div id="print-area"></div>

<script type="text/babel" src="app.js"></script>
</body>
</html>
